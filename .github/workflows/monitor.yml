name: 🏸 NVRC Badminton Monitor

on:
  schedule:
    # 国际标准时间 (UTC)。作为备用定时器
    - cron: '*/10 * * * *'
  workflow_dispatch:
  repository_dispatch:
    # 用于通过外部 cron-job.org 精准触发
    types: [run-monitor]
    # 手动控制面板配置
    inputs:
      location:
        description: '场馆筛选 (如 Delbrook, Lions Gate 等，留空则匹配所有场馆)'
        required: false
        default: ''
      days:
        description: '星期几筛选 (如 Tuesday Thursday，空格分隔，留空不限制)'
        required: false
        default: ''
      available:
        description: '仅显示/提醒当前有空余场次 (Available)'
        type: boolean
        required: true
        default: true
      my_schedule:
        description: '使用个人工作日程过滤 (工作日18:00后，周末全天)'
        type: boolean
        required: true
        default: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 授予写入权限以推回 sent_alerts.json 去重历史文件
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 手动触发：读取配置界面的自定义参数
            if [ -n "${{ github.event.inputs.location }}" ]; then
              ARGS="$ARGS --location '${{ github.event.inputs.location }}'"
            fi
            if [ -n "${{ github.event.inputs.days }}" ]; then
              ARGS="$ARGS --days ${{ github.event.inputs.days }}"
            fi
            if [ "${{ github.event.inputs.available }}" = "true" ]; then
              ARGS="$ARGS --available"
            fi
            if [ "${{ github.event.inputs.my_schedule }}" = "true" ]; then
              ARGS="$ARGS --my-schedule"
            fi
          else
            # 定时任务触发：默认使用最严格的个人日程过滤 + 只看有空位的场次
            ARGS="--available --my-schedule"
          fi
          
          # 运行抓取，如果匹配到新场地会自动发送邮件
          python scraper.py $ARGS

      - name: Commit and Save Alert History
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          if [ -f "sent_alerts.json" ]; then
            git add -f sent_alerts.json
            # 仅在 sent_alerts.json 确实有变动时才进行提交和推送，避免空提交报错
            if ! git diff-index --quiet HEAD --; then
              git commit -m "Update sent alerts history [skip ci]"
              git pull --rebase origin main
              git push
            else
              echo "No changes to alert history. Skipping push."
            fi
          fi
